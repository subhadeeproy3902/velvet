# Netlify build config for the velvet-fx demo site (velvet.mvp-subha.me).
# Builds the standalone Vite demo in /demo and publishes /dist-demo at root.

[build]
  base    = "."
  publish = "dist-demo"
  command = "bun install && cd demo && bun install && cd .. && bun run build:demo"

[build.environment]
  NODE_VERSION = "20"
  BUN_VERSION  = "1.1.0"
  # Skip the publish-time TypeScript check from prepublishOnly during demo
  # builds — the library is already type-checked separately in CI.
  HUSKY        = "0"

# SPA-style fallback so any direct hit on a route renders index.html.
# Not strictly needed (no client routing) but keeps the door open.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "interest-cohort=(), browsing-topics=()"

# ── Caching ───────────────────────────────────────────────────
# Long-cache the immutable hashed bundles
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-cache the OG / favicon SVGs (filenames are stable)
[[headers]]
  for = "/og.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    Content-Type  = "image/svg+xml; charset=utf-8"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
    Content-Type  = "image/svg+xml; charset=utf-8"

# Discovery files — short cache, correct content type
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "text/markdown; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/xml; charset=utf-8"

[[headers]]
  for = "/oembed.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/json; charset=utf-8"
