    <!-- Theme bootstrap before paint to avoid FOUC -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("velvet-theme");
          var prefersLight =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches;
          var t = stored || (prefersLight ? "light" : "dark");
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>

    <!-- ── JSON-LD: FAQPage (Answer Engine Optimization) ──── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is velvet-fx?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "velvet-fx is a React component that paints a real-time WebGL velvet fabric shader onto any element. Wrap any child element with <Velvet> and the shader renders draped, animated fabric — velvet, silk, satin, suede or crushed velvet — behind, around, inside, or over the children depending on which compositing variant you pick."
            }
          },
          {
            "@type": "Question",
            "name": "How do I install velvet-fx?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Run `bun add velvet-fx`, `npm install velvet-fx`, or `pnpm add velvet-fx`. It declares `react` and `react-dom` as peer dependencies and has zero runtime dependencies of its own."
            }
          },
          {
            "@type": "Question",
            "name": "What fabric types does velvet-fx render?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "One shader, five presets. Silk is low grain and high roughness (sharp specular highlights). Satin is mid grain, mid roughness. Velvet is high grain, medium roughness (matte pile). Suede is very high grain, very low roughness (deep matte). Crushed velvet is high depth (dramatic folds). All are tuned via four numeric props — grain, depth, roughness, intensity — so you can dial any fabric in between."
            }
          },
          {
            "@type": "Question",
            "name": "What are the compositing variants?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Four. `background` fills the element behind its children. `border` masks the canvas to a border ring so only the outline shimmers. `text` masks the canvas to the children's text glyph shape so the velvet only renders inside the letters. `overlay` floats the canvas on top of the children with `mix-blend-mode: overlay` and `pointer-events: none`, so velvet drapes over any existing content."
            }
          },
          {
            "@type": "Question",
            "name": "What drives the animation?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Five drivers. `auto` (default) — the shader's noise field drifts linearly through u_time on its own, no input needed. `cursor` — pointer position pans the texture. `scroll` — element scroll progress pans the texture. `gyroscope` — device-orientation gamma/beta pans the texture on mobile. `static` — a fixed angle, no movement. All five feed the same `lightX`/`lightY` uniforms each frame."
            }
          },
          {
            "@type": "Question",
            "name": "Does velvet-fx work with server-side rendering?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. SSR-safe. There is no `window`, `canvas`, or `document` access at module load. Styles inject once on the client via a singleton style tag. The canvas only mounts after hydration via `useState(false) + useEffect`, so the initial server render is a plain wrapper div with the children inside."
            }
          },
          {
            "@type": "Question",
            "name": "Does it cause React re-renders during the animation?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. The RAF loop reads all animation state from refs and writes directly to WebGL uniforms — there are zero setState calls in the loop. Prop changes update mirror refs via dedicated useEffects but never re-bind the loop or re-mount the GL context."
            }
          },
          {
            "@type": "Question",
            "name": "Which browsers are supported?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "WebGL 1.0 — Chrome / Edge 88+, Safari 14.1+, Firefox 63+. The shader uses `precision highp float`, unrollable for-loops with constant bounds, mat2/vec2/vec3 — all standard GLSL ES 1.00 features supported across evergreen browsers."
            }
          },
          {
            "@type": "Question",
            "name": "Does it respect prefers-reduced-motion?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. When the user has `prefers-reduced-motion: reduce` set, the cursor smoothing lerp is short-circuited to an instant snap so transitions don't slide, while the shader's slow ambient drift remains (it's the entire visual identity of the effect)."
            }
          }
        ]
      }
